version: '3.8'

services:
  blacktopbrews:
    build: .
    container_name: blacktopbrews
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-blacktopbrews2026}
      - SESSION_SECRET=${SESSION_SECRET:-blacktop-brews-secret-key-change-me}
    restart: always
