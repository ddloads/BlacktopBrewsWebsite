<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Banner Preview</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 2rem;
        }

        .banner-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--color-background);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Style 1: Centered Logo with Pattern */
        .logo-banner-1 {
            background-color: var(--color-background);
            background-image: radial-gradient(circle at 50% 50%, rgba(212, 165, 116, 0.1) 0%, transparent 60%);
            padding: 2rem;
            text-align: center;
            border-bottom: 4px solid var(--color-accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-banner-1 img {
            max-height: 120px;
            width: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .logo-banner-1 h1 {
            color: var(--color-accent);
            font-family: var(--font-heading);
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .logo-banner-1 p {
            color: var(--color-text-muted);
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* Style 2: Minimal Horizontal */
        .logo-banner-2 {
            background: linear-gradient(90deg, var(--color-primary-dark), var(--color-background));
            padding: 1.5rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 165, 116, 0.2);
        }

        .banner-brand {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .banner-brand img {
            height: 80px;
            width: auto;
        }

        .banner-text h2 {
            color: var(--color-white);
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            line-height: 1;
        }

        .banner-text span {
            color: var(--color-accent);
        }

        .banner-cta {
            background: var(--color-accent);
            color: var(--color-background);
            padding: 0.8rem 2rem;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .banner-cta:hover {
            background: var(--color-white);
        }
    </style>
</head>
<body>
    
    <!-- Option 1: Large Central Banner -->
    <div class="banner-container">
        <div class="logo-banner-1">
            <img src="uploads/logo.png" alt="Blacktop Brews Logo">
            <!-- <h1>BLACKTOP BREWS</h1> -->
            <p>Mobile Coffee Trailer</p>
        </div>
    </div>

    <!-- Option 2: Horizontal Header Banner -->
    <div class="banner-container">
        <div class="logo-banner-2">
            <div class="banner-brand">
                <img src="uploads/logo.png" alt="Blacktop Brews Logo">
                <div class="banner-text">
                    <h2>BLACKTOP <span>BREWS</span></h2>
                </div>
            </div>
            <a href="#" class="banner-cta">VIEW MENU</a>
        </div>
    </div>

</body>
</html>
